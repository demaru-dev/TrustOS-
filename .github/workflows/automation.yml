name: TrustOS Automation

on:
  schedule:
    # Initial schedule - will be dynamically updated
    - cron: '*/45 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [automation-trigger]

jobs:
  automate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.PAT_TOKEN }}
      
    - name: List files for debugging
      run: |
        pwd
        ls -la
        ls -la scripts/ || echo "scripts folder not found"
        cat package.json || echo "package.json not found"
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install
        npm install -g gh
        
    - name: Configure Git
      run: |
        echo "Configuring git..."
        git config --global user.name "Eli Trust"
        git config --global user.email "eli.trust@trustcorp.ai"
        echo "Git configured successfully"
        
    - name: Run Automation
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        echo "Starting automation..."
        echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token
        npm run automate
        
    - name: Push Changes
      if: success()
      run: |
        git push origin main || echo "No changes to push"

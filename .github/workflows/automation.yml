name: TrustOS Automation

on:
  schedule:
    # This will be overridden by the dynamic scheduler
    - cron: '*/46 * * * *'  # Fallback: runs every 46 minutes
  workflow_dispatch: # Allow manual trigger
  repository_dispatch:
    types: [automation-trigger]

jobs:
  automate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Setup GitHub CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y gh
        
    - name: Configure Git
      run: |
        git config --global user.name "Eli Trust"
        git config --global user.email "arsenetrams@gmail.com"
        
    - name: Run Automation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Use GITHUB_TOKEN for authentication
        echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        npm run automate
        
    - name: Push Changes
      if: success()
      run: |
        git push origin main || echo "No changes to push"

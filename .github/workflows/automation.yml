name: TrustOS Automation

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.PAT_TOKEN }}
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
        
    - name: Configure Git
      run: |
        git config --global user.name "Eli Trust"
        git config --global user.email "eli.trust@trustcorp.ai"
        
    - name: Run Automation
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        echo "Starting automation..."
        npm run automate
        echo "Automation completed!"
        
    - name: Push Changes
      if: success()
      run: |
        git push origin main || echo "No changes to push"

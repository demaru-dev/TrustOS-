name: TrustOS Dynamic Scheduler

on:
  schedule:
    # Check every minute for scheduling
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install
        npm install -g gh
        
    - name: Configure Git
      run: |
        echo "Configuring git..."
        git config --global user.name "Eli Trust"
        git config --global user.email "eli.trust@trustcorp.ai"
        echo "Git configured successfully"
        
    - name: Run Scheduler
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        echo "Starting scheduler..."
        echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token
        npm run scheduler

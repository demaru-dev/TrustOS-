name: TrustOS Dynamic Scheduler

on:
  schedule:
    # Run every 5 minutes to check if we need to trigger
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
        
    - name: Run Scheduler
      env:
        PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        echo "Starting scheduler..."
        node scripts/scheduler.js
